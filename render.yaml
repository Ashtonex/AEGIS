services:
  - type: web
    name: aegis-backend-api
    env: docker
    rootDir: imperium-api
    plan: free # Can be upgraded in Render UI
    region: frankfurt # Default region, can be changed
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: 'false'
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      # The following must be securely added in the Render Dashboard:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
