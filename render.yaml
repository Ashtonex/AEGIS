services:
  - type: web
    name: aegis-backend-api
    runtime: docker
    rootDir: imperium-api
    plan: free # Can be upgraded in Render UI
    region: frankfurt # Default region, can be changed
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: 'false'
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: FRONTEND_HOSTNAME
        fromService:
          type: web
          name: aegis-frontend
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: BACKGROUND_JOBS_ENABLED
        value: 'false'
      # The following must be securely added in the Render Dashboard:
      # Use the Supabase Supavisor session pooler URL (port 5432), because
      # Render cannot reach Supabase's IPv6-only direct database hostname.
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: REDIS_URL
        sync: false

  - type: web
    name: aegis-frontend
    runtime: docker
    rootDir: aegis-web
    plan: free # Can be upgraded in Render UI
    region: frankfurt
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: '1'
      # Free Render web services cannot receive private-network requests.
      # Reference the backend's public hostname and add HTTPS in application code.
      - key: INTERNAL_API_URL
        fromService:
          type: web
          name: aegis-backend-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: NEXT_PUBLIC_SUPABASE_URL
        fromService:
          type: web
          name: aegis-backend-api
          envVarKey: SUPABASE_URL
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        fromService:
          type: web
          name: aegis-backend-api
          envVarKey: SUPABASE_ANON_KEY
