[mypy]
python_version = 3.13
explicit_package_bases = True
ignore_missing_imports = True
follow_imports = skip
warn_unused_configs = True
exclude = ^(alembic|migrations|scripts|tests|core|routers|schemas)[\\/]|^spoof_test.*\.py$|^main\.py$|^app[\\/](api|core|db|domain|events|middleware|models|routers|shared|workers)[\\/]

[mypy-app.services.*]
check_untyped_defs = True
disallow_untyped_defs = False
warn_return_any = False
